name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links in the hub and timeline pages
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,206,429 --remap "file://.*/jay739.github.io/(.*) https://apps.jay739.dev/$1/" index.html timeline/index.html
          fail: true
