name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links in the hub and timeline pages
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,206,429 --exclude "^file://" index.html timeline/index.html
          fail: true
