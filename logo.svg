    <rect x="284" y="238" width="98" height="36" fill="#F2F0EA"/>
    <rect x="238" y="284" width="36" height="98" fill="#F2F0EA"/>
    <rect x="130" y="238" width="98" height="36" fill="#F2F0EA"/>
    <!-- satellite nodes -->
    <circle cx="256" cy="112" r="38" fill="#F2F0EA"/>
    <circle cx="400" cy="256" r="38" fill="#F2F0EA"/>
    <circle cx="256" cy="400" r="38" fill="#F2F0EA"/>
    <circle cx="112" cy="256" r="38" fill="#F2F0EA"/>
